{% extends 'base.html' %}
{% block title %}{{ _("Export Preview") }} - IRONCore{% endblock %}
{% block content %}
<section class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-white">{{ _("Export Payload Preview") }}</h1>
    <p class="mt-1 text-sm text-slate-400">{{ ticket.ticket_number }}</p>
  </div>

  <div class="rounded-2xl border border-slate-800/60 bg-slate-900/60 shadow-panel">
    <pre class="overflow-x-auto p-5 text-xs leading-relaxed text-slate-200 font-mono">{{ payload }}</pre>
  </div>
</section>
{% endblock %}
