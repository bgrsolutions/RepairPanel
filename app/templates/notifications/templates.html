{% extends 'base.html' %}
{% block title %}Notification Templates - IRONCore{% endblock %}
{% block content %}
<section class="space-y-4">
  <h1 class="text-2xl font-semibold text-white">Notification Templates</h1>
  <form method="post" action="{{ url_for('notifications.create_template') }}" class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 grid grid-cols-1 gap-2">
    <input name="key" placeholder="template key (e.g. quote_ready)" class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200" />
    <input name="language" value="en" class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200" />
    <input name="subject_template" placeholder="Subject template" class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200" />
    <textarea name="body_template" rows="4" placeholder="Body template" class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200"></textarea>
    <button class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-semibold text-white">Create Template</button>
  </form>

  <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
    <div class="space-y-2">
      {% for t in templates %}
      <div class="rounded-lg border border-slate-800 bg-slate-900 p-3">
        <p class="text-sm font-semibold text-white">{{ t.key }} ({{ t.language }})</p>
        <p class="text-xs text-slate-400">{{ t.subject_template }}</p>
      </div>
      {% else %}
      <p class="text-sm text-slate-500">No templates yet.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
